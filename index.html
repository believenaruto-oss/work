<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帝伯朗测算工具</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #409eff;
        }
        
        /* 按钮组样式 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .primary-btn {
            background-color: #409eff;
            color: white;
        }
        .primary-btn:active { background-color: #3a8ee6; }
        
        .reset-btn {
            background-color: #f4f4f5;
            color: #909399;
        }
        .reset-btn:active { background-color: #e9e9eb; }

        /* 计算结果展示区 */
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f0f9eb;
            border: 1px solid #e1f3d8;
            border-radius: 6px;
            color: #67c23a;
            display: none; 
        }
        .result-box p {
            margin: 8px 0;
            font-size: 15px;
            color: #333;
        }
        .highlight { color: #f56c6c; font-weight: bold;}
        .profit { color: #67c23a; font-weight: bold;}
        .loss { color: #f56c6c; font-weight: bold;}

        /* 图表容器 */
        .chart-container {
            margin-top: 20px;
            display: none;
        }

        /* 历史记录区 */
        .history-box {
            margin-top: 25px;
            border-top: 1px dashed #dcdfe6;
            padding-top: 15px;
            display: none;
        }
        .history-box h3 {
            font-size: 15px;
            color: #606266;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-list li {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #555;
            border-left: 4px solid #409eff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>帝伯朗测算工具</h2>
        
        <div id="formArea">
            <div class="input-group">
                <label>目标GMV (单位：万)</label>
                <input type="number" id="targetGMV" placeholder="如: 100">
            </div>
            <div class="input-group">
                <label>目标ROI (纯数字)</label>
                <input type="number" id="targetROI" placeholder="如: 2.5">
            </div>
            <div class="input-group">
                <label>预估退货率 (%)</label>
                <input type="number" id="returnRate" placeholder="如: 30">
            </div>
            <div class="input-group">
                <label>福袋及其他费用 (单位：万)</label>
                <input type="number" id="otherFees" placeholder="如: 2">
            </div>
            <div class="input-group">
                <label>达人佣金 (%)</label>
                <input type="number" id="commissionRate" placeholder="如: 20">
            </div>
            <div class="input-group">
                <label>前置费用 (单位：万)</label>
                <input type="number" id="upfrontFee" placeholder="如: 5">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="calculateData()" class="primary-btn">开始计算</button>
            <button onclick="resetForm()" class="reset-btn">一键清空</button>
        </div>

        <div class="result-box" id="resultBox">
            <p>退后GMV：<span class="highlight" id="outNetGMV"></span></p>
            <p>投流消耗：<span class="highlight" id="outAdSpend"></span></p>
            <p>实际费比：<span class="highlight" id="outExpenseRatio"></span></p>
            <p>达人收入：<span class="highlight" id="outInfluencerIncome"></span></p>
            <p style="border-top: 1px solid #e1f3d8; padding-top: 8px; margin-top: 8px;">
                预估毛利：<span id="outNetProfit"></span>
            </p>
        </div>

        <div class="chart-container" id="chartContainer">
            <canvas id="fundChart"></canvas>
        </div>

        <div class="history-box" id="historyBox">
            <h3>测算对比记录</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        let myChart = null; // 用于存储图表实例

        function calculateData() {
            let GMV = parseFloat(document.getElementById('targetGMV').value) || 0;
            let ROI = parseFloat(document.getElementById('targetROI').value) || 0;
            let returnRate = (parseFloat(document.getElementById('returnRate').value) || 0) / 100;
            let otherFees = parseFloat(document.getElementById('otherFees').value) || 0;
            let commissionRate = (parseFloat(document.getElementById('commissionRate').value) || 0) / 100;
            let upfrontFee = parseFloat(document.getElementById('upfrontFee').value) || 0;

            if (ROI === 0 && GMV !== 0) {
                alert("目标ROI不能为0！");
                return;
            }

            // 核心计算逻辑
            let netGMV = GMV * (1 - returnRate);
            let adSpend = (ROI > 0) ? (GMV / ROI) : 0;
            let commissionAmount = netGMV * commissionRate;
            let influencerIncome = upfrontFee + commissionAmount;
            
            let expenseRatio = 0;
            if (netGMV > 0) {
                expenseRatio = (adSpend + influencerIncome + otherFees) / netGMV;
            }
            
            // 新增计算：预估毛利 (退后GMV - 投流 - 达人 - 其他)
            let netProfit = netGMV - adSpend - influencerIncome - otherFees;

            // 1. 渲染文字结果
            document.getElementById('outNetGMV').innerText = netGMV.toFixed(2) + "万";
            document.getElementById('outAdSpend').innerText = adSpend.toFixed(2) + "万";
            document.getElementById('outExpenseRatio').innerText = (expenseRatio * 100).toFixed(2) + "%";
            document.getElementById('outInfluencerIncome').innerText = influencerIncome.toFixed(2) + "万";
            
            let profitEl = document.getElementById('outNetProfit');
            if(netProfit >= 0){
                profitEl.innerText = netProfit.toFixed(2) + "万";
                profitEl.className = "profit";
            } else {
                profitEl.innerText = netProfit.toFixed(2) + "万 (亏损)";
                profitEl.className = "loss";
            }

            document.getElementById('resultBox').style.display = 'block';

            // 2. 渲染饼状图
            renderChart(adSpend, influencerIncome, otherFees, netProfit);

            // 3. 增加一条历史记录
            addHistoryRecord(GMV, ROI, expenseRatio, netProfit);
        }

        function renderChart(adSpend, influencerIncome, otherFees, netProfit) {
            document.getElementById('chartContainer').style.display = 'block';
            const ctx = document.getElementById('fundChart').getContext('2d');
            
            // 如果图表已存在，先销毁旧的，防止重叠重绘
            if (myChart) {
                myChart.destroy();
            }

            let labels = ['投流消耗', '达人收入', '其他费用'];
            let data = [adSpend, influencerIncome, otherFees];
            let colors = ['#ff9f40', '#ff6384', '#36a2eb'];

            // 只有当毛利大于0时，才在饼图里展示利润部分
            if (netProfit > 0) {
                labels.push('预估毛利');
                data.push(netProfit);
                colors.push('#4bc0c0');
            }

            myChart = new Chart(ctx, {
                type: 'doughnut', // 圆环图
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: '退后GMV资金去向' }
                    }
                }
            });
        }

        function addHistoryRecord(GMV, ROI, expenseRatio, netProfit) {
            document.getElementById('historyBox').style.display = 'block';
            let list = document.getElementById('historyList');
            let li = document.createElement('li');
            
            let profitText = netProfit >= 0 ? 
                `<span class="profit">赚 ${netProfit.toFixed(2)}万</span>` : 
                `<span class="loss">亏 ${Math.abs(netProfit).toFixed(2)}万</span>`;

            // 记录当前的测算条件和核心结果
            li.innerHTML = `<b>目标GMV:</b> ${GMV}万 | <b>ROI:</b> ${ROI} <br> 
                            <b>结果:</b> 费比 ${(expenseRatio*100).toFixed(1)}% | 预估毛利: ${profitText}`;
            
            // 将新记录插入到列表的最上面
            list.insertBefore(li, list.firstChild);
        }

        function resetForm() {
            // 清空所有输入框
            let inputs = document.querySelectorAll('#formArea input');
            inputs.forEach(input => input.value = '');
            
            // 隐藏结果区和图表区，保留历史记录（方便比对）
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('chartContainer').style.display = 'none';
        }
    </script>
</body>
</html>
